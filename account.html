<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account | Keys Of Africa</title>

<link rel="stylesheet" href="st.css">

<style>

.account-container{
    max-width:1100px;
    margin:50px auto;
    display:grid;
    grid-template-columns:250px 1fr;
    gap:30px;
}

.account-sidebar{

    background:white;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
    padding:20px;

}

.account-sidebar h2{

    color:#d4af37;
    margin-bottom:20px;

}

.account-sidebar a{

    display:block;
    padding:12px;
    text-decoration:none;
    color:#333;
    border-radius:6px;
    margin-bottom:8px;

}

.account-sidebar a:hover{

    background:#d4af37;
    color:white;

}

.account-content{

    background:white;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
    padding:30px;

}

.info{

    margin:20px 0;

}

.info strong{

    display:inline-block;
    width:120px;

}

.logoutBtn{

    background:#dc3545;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:6px;
    cursor:pointer;

}

.logoutBtn:hover{

    background:#b52b38;

}

</style>

</head>

<body>

<script src="cart.js"></script>

<header>

<div class="logo">
<h1>Keys Of Africa</h1>
</div>

<nav>

<ul>

<li><a href="index.html">Home</a></li>
<li><a href="products.html">Products</a></li>
<li><a href="cart.html">🛒 Cart</a></li>

</ul>

</nav>

</header>

<div class="account-container">

<div class="account-sidebar">

<h2>My Account</h2>

<a href="#">👤 Profile</a>

<a href="orders.html">📦 My Orders</a>

<a href="#">⚙ Settings</a>

<button
class="logoutBtn"
onclick="logout()">

Logout

</button>

</div>

<div class="account-content">

<h1>

Welcome,

<span id="welcomeName"></span>

</h1>

<div class="info">

<p>

<strong>Name:</strong>

<span id="fullname"></span>

</p>

<p>

<strong>Email:</strong>

<span id="email"></span>

</p>

</div>

</div>

</div>

<script>

const name = localStorage.getItem("userName");
const email = localStorage.getItem("userEmail");

if(!localStorage.getItem("loggedIn")){

    window.location.href="login.html";

}

document.getElementById("welcomeName").textContent=name;
document.getElementById("fullname").textContent=name;
document.getElementById("email").textContent=email;

</script>

</body>
</html>
