<!DOCTYPE html>
<html>

<head>
    <title>Manage Products</title>
</head>

<body>

    <h1>Manage Products</h1>

    <form id="productForm">

        <input
            type="text"
            id="name"
            placeholder="Product Name"
            required>

        <br><br>

        <input
             type="text"
             id="category"
             placeholder="Category"
             required>

        <br><br>

        <input
            type="number"
            id="price"
            placeholder="Price"
            required>

        <br><br>

        <input
            type="text"
            id="image"
            placeholder="Image URL"
            required>

        <br><br>

        <textarea
            id="description"
            placeholder="Description"></textarea>

        <br><br>

        <button type="submit">

            Add Product

        </button>

    </form>

    <script src="admin-products.js"></script>

</body>

</html>
