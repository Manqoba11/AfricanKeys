
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Keys Of Africa</title>
    <link rel="stylesheet" href="st.css">
    <style>
        .auth-page { min-height:80vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; background:#f5f6f8; }
        .auth-card { background:#fff; border-radius:14px; box-shadow:0 6px 28px rgba(0,0,0,.10); padding:44px 40px; width:100%; max-width:420px; }
        .auth-logo { text-align:center; font-size:26px; font-weight:bold; color:#d4af37; margin-bottom:6px; }
        .auth-subtitle { text-align:center; color:#888; font-size:13px; margin-bottom:24px; }
        .auth-card h2 { text-align:center; color:#0f172a; font-size:21px; margin-bottom:22px; }
        .auth-group { margin-bottom:16px; }
        .auth-group label { display:block; font-size:13px; font-weight:bold; color:#0f172a; margin-bottom:5px; }
        .auth-group input { width:100%; padding:11px 14px; border:1.5px solid #e2e8f0; border-radius:7px; font-size:15px; font-family:inherit; background:#fafafa; transition:border-color 0.2s; box-sizing:border-box; }
        .auth-group input:focus { outline:none; border-color:#d4af37; background:#fff; }
        .auth-btn { width:100%; padding:13px; background:#d4af37; color:white; border:none; border-radius:7px; font-size:16px; font-weight:bold; cursor:pointer; margin-top:6px; transition:background 0.2s; }
        .auth-btn:hover { background:#b9911e; }
        .auth-btn:disabled { background:#ccc; cursor:not-allowed; }
        .auth-error { color:#dc2626; font-size:13px; text-align:center; min-height:18px; margin-bottom:8px; }
        .auth-link { text-align:center; margin-top:20px; font-size:14px; color:#666; }
        .auth-link a { color:#d4af37; font-weight:bold; text-decoration:none; }
        .auth-link a:hover { text-decoration:underline; }
        hr { border:none; border-top:1px solid #e2e8f0; margin:20px 0; }
    </style>
</head>
<body>
    <script src="cart.js"></script>

<header>
    <div class="logo"><h1>Keys Of Africa</h1></div>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact Us</a></li>
            <li><a href="Ts&Cs.html">Terms & Conditions</a></li>
            <li><a href="cart.html">🛒 Cart</a></li>
            <li id="nav-login"><a href="login.html">Login</a></li>
            <li id="nav-signup"><a href="signup.html">Sign Up</a></li>
            <li id="nav-logout" style="display:none;">
                <a href="#" onclick="logout()">Logout</a>
            </li>
            <li id="nav-greeting" style="color:#d4af37;font-weight:600;padding:0 6px;list-style:none;"></li>
        </ul>
    </nav>
</header>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">Keys Of Africa</div>
            <div class="auth-subtitle">Aluminium Doors &amp; Windows</div>
            <hr>
            <h2>Login to Your Account</h2>
            <form id="loginForm" novalidate>
                <div class="auth-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="example@email.com" required autocomplete="email">
                </div>
                <div class="auth-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Your password" required autocomplete="current-password">
                </div>
                <p class="auth-error" id="login-error"></p>
                <button type="submit" class="auth-btn" id="login-btn">Login</button>
            </form>
            <div class="auth-link">
                Don't have an account? <a href="signup.html">Sign Up here</a>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 <span>Keys Of Africa</span>. All rights reserved.</p>
    </footer>
    <a href="https://wa.me/27637836366" class="floating-whatsapp" aria-label="WhatsApp">💬</a>

    <script   src="login.js"></script>
</body>
</html>
