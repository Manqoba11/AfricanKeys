    <link rel="stylesheet" href="st.css">
</head>
<body>

<header>
    <div class="logo">
        <h1>Keys Of Africa</h1>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="cart.html"> Cart</a></li>
            <li id="nav-login">
                <a href="login.html">Login</a>
            </li>
            <li id="nav-signup">
                <a href="signup.html">Sign Up</a>
            </li>
            <li id="nav-account" class="account-menu" style="display:none;">
                <a href="#">
                    My Account ▼
                </a>

                <ul class="account-dropdown">

                    <li>
                        <a href="account.html"> My Profile</a>
                    </li>

                    <li>

                    </li>

                    <li>
                        <a href="#" onclick="logout()"> Logout</a>
                    </li>

                </ul>

            </li>-
        </ul>
    </nav>
</header>

<section class="page-banner">

    <h1>Our Products</h1>

    <p>
        Premium Aluminium Doors, Windows and Gates
    </p>

</section>

<section class="shop-tools">

    <input
        type="text"
        id="searchInput"
        placeholder="🔍 Search products..."
    >

    <select id="sortProducts">

        <option value="default">Sort Products</option>

        <option value="low">
            Price: Low to High
        </option>

        <option value="high">
            Price: High to Low
        </option>

        <option value="az">
            Name: A-Z
        </option>

    </select>

</section>

<section class="category-filter">

    <button data-category="all">All</button>

    <button data-category="doors">Doors</button>

    <button data-category="windows">Windows</button>

    <button data-category="gates">Gates</button>

</section>

<section id="productsContainer">

</section>

<script src="products.js"></script>

<script src="cart.js"></script>
