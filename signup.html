<div class="signup-page">

<h1 class="signup-title">Create Your Account</h1>

<div class="signup-container">

    <form id="signupForm">

        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label for="surname">Surname</label>
        <input type="text" id="surname" placeholder="Enter your surname" required>

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter your phone number" required>

        <label for="address">Address</label>
        <input type="text" id="address" placeholder="Enter street address" required>
        <input type="text" id="suburb" placeholder="Enter suburb" required>
        <input type="text" id="state" placeholder="Enter province" required>
        <input type="text" id="postal" placeholder="Enter postal code" required>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>

        <button type="submit" class="signup-btn">
            Sign Up
        </button>

        <button type="reset" class="clear-btn">
            Clear
        </button>

        <p class="login-link">
            Already have an account?
            <a href="login.html">Login Here</a>
        </p>

    </form>
    </div>
</div>
