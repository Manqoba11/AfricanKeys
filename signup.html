    <link rel="stylesheet" href="st.css">
</head>
<body>
            <script src="cart.js"></script>
            <script src="signup.js"></script>
<header>
    <div class="logo">
        <h1>Keys Of Africa</h1>
    </div>
    <nav id="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>

        </ul>
    </nav>
</header>
<div class="signup-page">

<h1 class="signup-title">Create Your Account</h1>

<div class="signup-container">

    <form id="signupForm">

        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label for="surname">Surname</label>
        <input type="text" id="surname" placeholder="Enter your surname" required>

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter your phone number" required>

        <label for="address">Address</label>
        <input type="text" id="address" placeholder="Enter street address" required>
        <input type="text" id="suburb" placeholder="Enter suburb" required>
        <input type="text" id="state" placeholder="Enter province" required>
        <input type="text" id="postal" placeholder="Enter postal code" required>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>

        <button type="submit" class="signup-btn">
            Sign Up
        </button>

        <button type="reset" class="clear-btn">
            Clear
        </button>

        <p class="login-link">
            Already have an account?
            <a href="login.html">Login Here</a>
        </p>

    </form>
    </div>
</div>
        <script>
            document.getElementById("signupForm").addEventListener("submit", function(e){

            let password =
            document.getElementById("password").value;

            let confirm =
            document.getElementById("confirmPassword").value;

            if(password !== confirm){
                e.preventDefault();
            alert("Passwords do not match!");
            }
            });
</script>

</body>
</html>
